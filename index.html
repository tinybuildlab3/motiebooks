<!DOCTYPE html>

<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>حیات‌زاده لمتد</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C9A84C;--gold-dim:#8B6E2E;
  --navy:#0A1628;--navy-mid:#12213A;--navy-light:#1C2F4E;--navy-border:#243657;
  --white:#F4F0E8;--white-dim:#C8C0B0;
  --red:#E05252;--green:#52C785;--blue:#5286C7;--radius:12px;
}
body{font-family:'Vazirmatn',sans-serif;background:var(--navy);color:var(--white);direction:rtl;min-height:100vh;overflow-x:hidden}
/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 60% 40%,#1C2F4E 0%,#0A1628 70%)}
.login-card{background:var(--navy-mid);border:1px solid var(--navy-border);border-radius:20px;padding:32px 24px;width:100%;max-width:380px}
.login-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px}
.login-title{font-size:20px;font-weight:800;color:var(--gold);text-align:center}
.login-sub{font-size:11px;color:var(--white-dim);text-align:center;margin-top:4px;margin-bottom:24px}
/* APP */
.app{display:flex;flex-direction:column;min-height:100vh;padding-bottom:65px}
/* TOPBAR */
.topbar{background:var(--navy-mid);border-bottom:1px solid var(--navy-border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:700}
.topbar-user{display:flex;align-items:center;gap:6px;background:var(--navy-light);border-radius:8px;padding:6px 12px;font-size:12px}
.user-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
/* BOTTOM TAB */
.bottom-tab{position:fixed;bottom:0;right:0;left:0;background:var(--navy-mid);border-top:1px solid var(--navy-border);display:flex;z-index:100;height:62px}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--white-dim);font-size:10px;font-weight:500;gap:3px;border:none;background:none;font-family:inherit;transition:color .15s}
.tab-item.active{color:var(--gold)}
.tab-icon{font-size:20px}
/* CONTENT */
.content{padding:16px;flex:1}
/* CARDS */
.card{background:var(--navy-mid);border:1px solid var(--navy-border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px}
/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--navy-mid);border:1px solid var(--navy-border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:4px;height:100%}
.stat-card.gold::before{background:var(--gold)}.stat-card.green::before{background:var(--green)}.stat-card.blue::before{background:var(--blue)}.stat-card.red::before{background:var(--red)}
.stat-label{font-size:10px;color:var(--white-dim);margin-bottom:5px}
.stat-value{font-size:20px;font-weight:800}
.stat-card.gold .stat-value{color:var(--gold)}.stat-card.green .stat-value{color:var(--green)}.stat-card.blue .stat-value{color:var(--blue)}.stat-card.red .stat-value{color:var(--red)}
.stat-sub{font-size:10px;color:var(--white-dim);margin-top:2px}
/* TABLE */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:400px}
thead tr{background:var(--navy-light)}
th{padding:9px 11px;text-align:right;font-weight:600;color:var(--gold);font-size:11px;white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid var(--navy-border);color:var(--white-dim)}
tr:last-child td{border-bottom:none}
/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-green{background:rgba(82,199,133,.15);color:var(--green)}
.badge-red{background:rgba(224,82,82,.15);color:var(--red)}
.badge-gold{background:rgba(201,168,76,.15);color:var(--gold)}
.badge-blue{background:rgba(82,134,199,.15);color:var(--blue)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:600;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--navy)}
.btn-outline{background:transparent;border:1px solid var(--navy-border);color:var(--white-dim)}
.btn-danger{background:rgba(224,82,82,.15);color:var(--red);border:1px solid rgba(224,82,82,.3)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-full{width:100%;justify-content:center}
/* FORMS */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-label{font-size:11px;color:var(--white-dim);font-weight:500}
.form-input,.form-select,.form-textarea{background:var(--navy-light);border:1px solid var(--navy-border);border-radius:8px;padding:10px 13px;color:var(--white);font-family:'Vazirmatn',sans-serif;font-size:14px;direction:rtl;width:100%;outline:none;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--gold)}
.form-textarea{min-height:70px;resize:vertical}
option{background:var(--navy-mid)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--navy-mid);border:1px solid var(--navy-border);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--navy-border)}
.modal-actions{display:flex;gap:8px;margin-top:16px}
/* RECEIPT */
.receipt-box{background:#fff;color:#000;padding:20px;border-radius:8px;direction:rtl}
.receipt-title{font-size:16px;font-weight:800;text-align:center;margin-bottom:3px}
.receipt-sub{font-size:10px;text-align:center;color:#666;margin-bottom:12px}
.receipt-hr{border:none;border-top:1px dashed #ccc;margin:10px 0}
.receipt-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.receipt-total{font-weight:800;font-size:13px}
.receipt-footer{font-size:9px;text-align:center;color:#888;margin-top:10px}
/* LOADING */
#loadingBar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--gold);z-index:9999;display:none}
/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;display:none;white-space:nowrap}
.toast.show{display:block}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.flex-gap{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.mb-14{margin-bottom:14px}
.text-gold{color:var(--gold)}.text-green{color:var(--green)}.text-red{color:var(--red)}.text-dim{color:var(--white-dim)}.text-sm{font-size:11px}.font-bold{font-weight:700}
.spinner{width:20px;height:20px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loadingBar"></div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->

<div id="loginPage">
<div class="login-page">
  <div class="login-card">
    <div class="login-icon">🏢</div>
    <div class="login-title">حیات‌زاده لمتد</div>
    <div class="login-sub">سیستم حسابداری سهامی</div>
    <div class="form-group">
      <label class="form-label">نام کاربری</label>
      <input class="form-input" id="loginUser" placeholder="نام کاربری" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group">
      <label class="form-label">رمز عبور</label>
      <div style="position:relative">
        <input class="form-input" type="password" id="loginPass" placeholder="••••••••" style="padding-left:42px" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button type="button" onclick="togglePass()" id="passToggle" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--white-dim)">👁️</button>
      </div>
    </div>
    <div id="loginErr" style="color:var(--red);font-size:12px;text-align:center;margin-bottom:10px;display:none"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">🔐 ورود به سیستم</button>
  </div>
</div>
</div>

<!-- APP -->

<div id="appPage" style="display:none">
  <div class="app">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">🏠 داشبورد</div>
      <div class="topbar-user">
        <div class="user-dot"></div>
        <span id="userNameTop"></span>
      </div>
    </div>
    <div class="content" id="mainContent">
      <div class="spinner"></div>
    </div>
  </div>
  <div class="bottom-tab" id="bottomTab">
    <button class="tab-item active" onclick="goPage('dashboard')" id="tab-dashboard"><div class="tab-icon">🏠</div><span>داشبورد</span></button>
    <button class="tab-item" onclick="goPage('shareholders')" id="tab-shareholders" data-admin><div class="tab-icon">👥</div><span>سهم‌داران</span></button>
    <button class="tab-item" onclick="goPage('payments')" id="tab-payments" data-admin><div class="tab-icon">💳</div><span>پرداخت</span></button>
    <button class="tab-item" onclick="goPage('investments')" id="tab-investments" data-admin><div class="tab-icon">🏭</div><span>سرمایه</span></button>
    <button class="tab-item" onclick="goPage('reports')" id="tab-reports"><div class="tab-icon">📊</div><span>گزارش</span></button>
  </div>
</div>

<script>
const SB_URL='https://cichvpyaijiyckmwwemg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpY2h2cHlhaWppeWNrbXd3ZW1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMDA3MzcsImV4cCI6MjA5MjY3NjczN30.Yew5p662R9OaFm1T8S2B0z1GAqdEtxprUtwBrM5mHNA';

async function sbGet(t,p=''){
  try{const r=await fetch(`${SB_URL}/rest/v1/${t}${p}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});return r.ok?r.json():[];}catch{return[];}
}
async function sbPost(t,b){
  try{const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(b)});return r.ok?r.json():null;}catch{return null;}
}
async function sbPatch(t,b,p){
  try{const r=await fetch(`${SB_URL}/rest/v1/${t}${p}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(b)});return r.ok?r.json():null;}catch{return null;}
}
async function sbDel(t,p){
  try{await fetch(`${SB_URL}/rest/v1/${t}${p}`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});}catch{}
}

let DB={shareholders:[],payments:[],investments:[],returns:[],distributions:[],users:[]};
let currentUser=null;

function fmt(n){return new Intl.NumberFormat('fa-AF').format(Math.round(n||0));}
function today(){const d=new Date();return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');}
function showToast(msg='✅ ذخیره شد!'){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function loading(show){document.getElementById('loadingBar').style.display=show?'block':'none';}
function togglePass(){const i=document.getElementById('loginPass'),b=document.getElementById('passToggle');if(i.type==='password'){i.type='text';b.textContent='🙈';}else{i.type='password';b.textContent='👁️';}}

async function loadDB(){
  loading(true);
  const [sh,py,inv,ret,dist,us]=await Promise.all([
    sbGet('shareholders','?order=id.asc'),
    sbGet('payments','?order=id.asc'),
    sbGet('investments','?order=id.asc'),
    sbGet('returns','?order=id.asc'),
    sbGet('distributions','?order=id.asc'),
    sbGet('users','?order=id.asc')
  ]);
  DB={shareholders:sh||[],payments:py||[],investments:inv||[],returns:ret||[],distributions:dist||[],users:us||[]};
  loading(false);
}

async function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  loading(true);
  const users=await sbGet('users',`?username=eq.${u}&password=eq.${p}`);
  loading(false);
  const err=document.getElementById('loginErr');
  if(!users||!users.length){err.style.display='block';err.textContent='نام کاربری یا رمز عبور اشتباه است';return;}
  currentUser=users[0];
  err.style.display='none';
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appPage').style.display='block';
  document.getElementById('userNameTop').textContent=currentUser.name;
  document.querySelectorAll('[data-admin]').forEach(el=>{
    el.style.display=currentUser.role==='admin'?'flex':'none';
  });
  await loadDB();
  goPage('dashboard');
}

function doLogout(){
  currentUser=null;
  document.getElementById('loginPage').style.display='block';
  document.getElementById('appPage').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

const pageTitles={dashboard:'🏠 داشبورد',shareholders:'👥 سهم‌داران',payments:'💳 پرداخت‌ها',investments:'🏭 سرمایه‌گذاری',returns:'🔄 برگشت سرمایه',profit:'📈 تقسیم مفاد',reports:'📊 گزارشات'};

function goPage(page){
  document.querySelectorAll('.tab-item').forEach(el=>el.classList.remove('active'));
  const tab=document.getElementById('tab-'+page);
  if(tab) tab.classList.add('active');
  document.getElementById('pageTitle').textContent=pageTitles[page]||page;
  const c=document.getElementById('mainContent');
  if(page==='dashboard') renderDashboard(c);
  else if(page==='shareholders') renderShareholders(c);
  else if(page==='payments') renderPayments(c);
  else if(page==='investments') renderInvestments(c);
  else if(page==='returns') renderReturns(c);
  else if(page==='profit') renderProfit(c);
  else if(page==='reports') renderReports(c);
}

// DASHBOARD
function renderDashboard(c){
  const active=DB.shareholders.filter(s=>s.status==='active');
  const totalShares=active.reduce((a,s)=>a+(+s.shares||0),0);
  const totalCapital=DB.shareholders.reduce((a,s)=>a+(+s.total_paid||0),0);
  const totalProfit=DB.returns.reduce((a,r)=>a+(+r.profit||0),0);
  c.innerHTML=`
  <div class="stats-grid">
    <div class="stat-card blue"><div class="stat-label">👥 سهم‌داران فعال</div><div class="stat-value">${active.length}</div><div class="stat-sub">از ${DB.shareholders.length} نفر</div></div>
    <div class="stat-card gold"><div class="stat-label">📊 کل سهام</div><div class="stat-value">${fmt(totalShares)}</div><div class="stat-sub">واحد سهم</div></div>
    <div class="stat-card green"><div class="stat-label">💰 کل سرمایه</div><div class="stat-value">${fmt(totalCapital)}</div><div class="stat-sub">افغانی</div></div>
    <div class="stat-card green"><div class="stat-label">📈 کل مفاد</div><div class="stat-value">${fmt(totalProfit)}</div><div class="stat-sub">افغانی</div></div>
  </div>
  <div class="card">
    <div class="card-title">🏭 سرمایه‌گذاری‌ها</div>
    <div class="table-wrap"><table>
      <thead><tr><th>توضیح</th><th>مبلغ</th><th>وضعیت</th></tr></thead>
      <tbody>${DB.investments.map(i=>`<tr>
        <td>${i.description||'—'}</td>
        <td class="text-gold font-bold">${fmt(i.amount)}</td>
        <td><span class="badge ${i.status==='returned'?'badge-green':'badge-gold'}">${i.status==='returned'?'تکمیل':'در جریان'}</span></td>
      </tr>`).join('')||'<tr><td colspan="3" style="text-align:center;color:var(--white-dim)">هنوز سرمایه‌گذاری ثبت نشده</td></tr>'}</tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="card-title">💹 آخرین پرداخت‌ها</div>
    <div class="table-wrap"><table>
      <thead><tr><th>سهم‌دار</th><th>مبلغ</th><th>نوع</th></tr></thead>
      <tbody>${[...DB.payments].reverse().slice(0,5).map(p=>{
        const sh=DB.shareholders.find(s=>s.id===p.shareholder_id);
        return`<tr><td class="font-bold">${sh?.name?.split(' ')[0]||'—'}</td>
        <td class="text-green font-bold">${fmt(p.amount)}</td>
        <td><span class="badge ${p.type==='monthly'?'badge-blue':'badge-gold'}">${p.type==='monthly'?'ماهانه':'سهم'}</span></td></tr>`;
      }).join('')||'<tr><td colspan="3" style="text-align:center;color:var(--white-dim)">هنوز پرداختی ثبت نشده</td></tr>'}</tbody>
    </table></div>
  </div>
  ${currentUser?.role==='admin'?`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    <button class="btn btn-outline btn-full" onclick="goPage('returns')">🔄 برگشت سرمایه</button>
    <button class="btn btn-outline btn-full" onclick="goPage('profit')">📈 تقسیم مفاد</button>
  </div>`:''}`;
}

// SHAREHOLDERS
function renderShareholders(c){
  c.innerHTML=`
  <div class="flex-between mb-14">
    <div><div style="font-size:18px;font-weight:800">سهم‌داران</div>
    <div class="text-dim text-sm">${DB.shareholders.length} نفر</div></div>
    <button class="btn btn-primary btn-sm" onclick="showAddShareholder()">+ افزودن</button>
  </div>
  <div class="table-wrap">
  <table>
    <thead><tr><th>نام</th><th>سهام</th><th>پرداخت</th><th>وضعیت</th><th></th></tr></thead>
    <tbody>${DB.shareholders.map(s=>`<tr>
      <td><div class="font-bold">${s.name}</div><div class="text-dim text-sm">${s.phone||''}</div></td>
      <td class="text-gold font-bold">${s.shares}</td>
      <td>${fmt(s.total_paid)}</td>
      <td><span class="badge ${s.status==='active'?'badge-green':'badge-red'}">${s.status==='active'?'فعال':'غیرفعال'}</span></td>
      <td><div class="flex-gap">
        <button class="btn btn-outline btn-sm" onclick="editShareholder(${s.id})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteShareholder(${s.id})">🗑️</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

async function showAddShareholder(){
  showModal('افزودن سهم‌دار',`
    <div class="form-group"><label class="form-label">نام کامل *</label><input class="form-input" id="m-name" placeholder="نام کامل"/></div>
    <div class="form-group"><label class="form-label">شماره تماس</label><input class="form-input" id="m-phone" placeholder="07xxxxxxxx"/></div>
    <div class="form-group"><label class="form-label">تعداد سهم *</label><input class="form-input" type="number" id="m-shares" placeholder="مثال: 5"/></div>
    <div class="form-group"><label class="form-label">تاریخ عضویت</label><input class="form-input" id="m-date" value="${today()}"/></div>
    <div class="form-group"><label class="form-label">وضعیت</label>
      <select class="form-select" id="m-status"><option value="active">فعال</option><option value="inactive">غیرفعال</option></select>
    </div>`,'saveShareholder(0)');
}

async function editShareholder(id){
  const s=DB.shareholders.find(x=>x.id===id);if(!s)return;
  showModal('ویرایش سهم‌دار',`
    <div class="form-group"><label class="form-label">نام کامل *</label><input class="form-input" id="m-name" value="${s.name}"/></div>
    <div class="form-group"><label class="form-label">شماره تماس</label><input class="form-input" id="m-phone" value="${s.phone||''}"/></div>
    <div class="form-group"><label class="form-label">تعداد سهم *</label><input class="form-input" type="number" id="m-shares" value="${s.shares}"/></div>
    <div class="form-group"><label class="form-label">تاریخ عضویت</label><input class="form-input" id="m-date" value="${s.join_date||''}"/></div>
    <div class="form-group"><label class="form-label">وضعیت</label>
      <select class="form-select" id="m-status">
        <option value="active" ${s.status==='active'?'selected':''}>فعال</option>

async function deleteShareholder(id){

async function savePayment(){
  const shId=Number(document.getElementById('m-shId').value);

  if(!shId||!amount){alert('سهم‌دار و مبلغ الزامی است!');return;}
  const type=document.getElementById('m-type').value;
  loading(true);
  await sbPost('payments',{shareholder_id:shId,amount,date:document.getElementById('m-date').value,type,note:document.getElementById('m-note').value});
  const sh=DB.shareholders.find(s=>s.id===shId);
  if(sh){
    const newPaid=(+sh.total_paid||0)+amount;
    const newShares=type==='share_purchase'?(+sh.shares||0)+Math.floor(amount/5000):(+sh.shares||0);
    await sbPatch('shareholders',{total_paid:newPaid,shares:newShares},`?id=eq.${shId}`);
  }
  await loadDB();loading(false);closeModal();showToast();goPage('payments');
}

}

function showDistribute(){
const activeShares=DB.shareholders.filter(s=>s.status===‘active’).reduce((a,s)=>a+(+s.shares||0),0);

}

function calcDist(){
const retId=Number(document.getElementById(‘m-retId’)?.value);
const ret=DB.returns.find(r=>r.id===retId);
const activeShares=DB.shareholders.filter(s=>s.status===‘active’).reduce((a,s)=>a+(+s.shares||0),0);
const prev=document.getElementById(‘distPrev’);
if(ret&&prev){prev.style.display=‘block’;document.getElementById(‘distPerShare’).textContent=fmt((+ret.profit||0)/activeShares)+’ افغانی’;}
}

async function saveDist(){
const retId=Number(document.getElementById(‘m-retId’).value);
const ret=DB.returns.find(r=>r.id===retId);
if(!retId||!ret){alert(‘برگشت سرمایه را انتخاب کنید!’);return;}
const activeShares=DB.shareholders.filter(s=>s.status===‘active’).reduce((a,s)=>a+(+s.shares||0),0);
const profitPerShare=(+ret.profit||0)/activeShares;
loading(true);
await sbPost(‘distributions’,{return_id:retId,total_profit:ret.profit,total_shares:activeShares,profit_per_share:profitPerShare,date:document.getElementById(‘m-date’).value});
await loadDB();loading(false);closeModal();showToast(‘⚡ مفاد تقسیم شد!’);goPage(‘profit’);
}

<td class="font-bold">${s.name}</td><td>${s.shares}</td>

// MODAL
function showModal(title,body,saveAction,cancelLabel){
const overlay=document.createElement(‘div’);
overlay.className=‘modal-overlay’;overlay.id=‘modalOverlay’;
overlay.onclick=e=>{if(e.target===overlay)closeModal();};
overlay.innerHTML=`<div class="modal"> <div class="modal-title">${title}</div> ${body} <div class="modal-actions"> ${saveAction?`<button class="btn btn-primary" onclick="${saveAction}">💾 ذخیره</button>`:’’}
<button class="btn btn-outline" onclick="closeModal()">${cancelLabel||‘بستن’}</button>
</div>

  </div>`;
  document.body.appendChild(overlay);
}
function closeModal(){const m=document.getElementById('modalOverlay');if(m)m.remove();}
