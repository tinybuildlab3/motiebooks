
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>حیات‌زاده لمتد — سیستم حسابداری سهامی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-dim:#8B6E2E;--gold-light:#E8C97A;
  --navy:#0A1628;--navy-mid:#12213A;--navy-light:#1C2F4E;--navy-border:#243657;
  --white:#F4F0E8;--white-dim:#C8C0B0;
  --red:#E05252;--green:#52C785;--blue:#5286C7;--radius:12px;
}
body{font-family:'Vazirmatn',sans-serif;background:var(--navy);color:var(--white);direction:rtl;min-height:100vh}
.app{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:260px;background:var(--navy-mid);border-left:1px solid var(--navy-border);display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;z-index:100}
.sidebar-logo{padding:24px 20px 18px;border-bottom:1px solid var(--navy-border)}
.logo-title{font-size:17px;font-weight:800;color:var(--gold)}
.logo-sub{font-size:11px;color:var(--white-dim);margin-top:3px}
.nav-section{padding:14px 10px 6px}
.nav-label{font-size:10px;color:var(--white-dim);letter-spacing:1px;padding:0 8px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--white-dim);transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:right;font-family:inherit}
.nav-item:hover{background:var(--navy-light);color:var(--white)}
.nav-item.active{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--navy);font-weight:700}
/* MAIN */
.main{flex:1;margin-right:260px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--navy-mid);border-bottom:1px solid var(--navy-border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700}
.topbar-user{display:flex;align-items:center;gap:8px;background:var(--navy-light);border-radius:8px;padding:7px 14px;font-size:13px}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.content{padding:24px;flex:1}
/* CARDS */
.card{background:var(--navy-mid);border:1px solid var(--navy-border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:14px}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--navy-mid);border:1px solid var(--navy-border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 var(--radius) var(--radius) 0}
.stat-card.gold::before{background:var(--gold)}.stat-card.green::before{background:var(--green)}.stat-card.blue::before{background:var(--blue)}.stat-card.red::before{background:var(--red)}
.stat-label{font-size:11px;color:var(--white-dim);margin-bottom:6px}
.stat-value{font-size:24px;font-weight:800}
.stat-card.gold .stat-value{color:var(--gold)}.stat-card.green .stat-value{color:var(--green)}.stat-card.blue .stat-value{color:var(--blue)}.stat-card.red .stat-value{color:var(--red)}
.stat-sub{font-size:10px;color:var(--white-dim);margin-top:3px}
/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--navy-light)}
th{padding:11px 13px;text-align:right;font-weight:600;color:var(--gold);font-size:11px;white-space:nowrap}
td{padding:10px 13px;border-bottom:1px solid var(--navy-border);color:var(--white-dim)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02);color:var(--white)}
/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(82,199,133,.15);color:var(--green)}
.badge-red{background:rgba(224,82,82,.15);color:var(--red)}
.badge-gold{background:rgba(201,168,76,.15);color:var(--gold)}
.badge-blue{background:rgba(82,134,199,.15);color:var(--blue)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:600;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--navy)}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--navy-border);color:var(--white-dim)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:rgba(224,82,82,.15);color:var(--red);border:1px solid rgba(224,82,82,.3)}
.btn-sm{padding:5px 11px;font-size:11px}
/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;color:var(--white-dim);font-weight:500}
.form-input,.form-select,.form-textarea{background:var(--navy-light);border:1px solid var(--navy-border);border-radius:8px;padding:10px 13px;color:var(--white);font-family:'Vazirmatn',sans-serif;font-size:13px;transition:border-color .2s;direction:rtl;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--gold)}
.form-textarea{min-height:75px;resize:vertical}
option{background:var(--navy-mid)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--navy-mid);border:1px solid var(--navy-border);border-radius:16px;padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--navy-border)}
.modal-actions{display:flex;gap:10px;justify-content:flex-start;margin-top:18px}
/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 60% 40%,#1C2F4E 0%,#0A1628 70%)}
.login-card{background:var(--navy-mid);border:1px solid var(--navy-border);border-radius:20px;padding:38px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-icon{width:58px;height:58px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}
.login-title{font-size:22px;font-weight:800;color:var(--gold);text-align:center}
.login-sub{font-size:11px;color:var(--white-dim);text-align:center;margin-top:4px;margin-bottom:28px}
/* CHART */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px;padding-top:8px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1}
.bar-fill{width:100%;border-radius:5px 5px 0 0;transition:height .5s ease;min-height:3px}
.bar-label{font-size:10px;color:var(--white-dim);margin-top:5px;text-align:center}
/* RECEIPT */
.receipt-box{background:#fff;color:#000;padding:22px;border-radius:8px;direction:rtl;max-width:340px;margin:0 auto}
.receipt-title{font-size:17px;font-weight:800;text-align:center;margin-bottom:3px}
.receipt-sub{font-size:10px;text-align:center;color:#666;margin-bottom:14px}
.receipt-hr{border:none;border-top:1px dashed #ccc;margin:10px 0}
.receipt-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.receipt-total{font-weight:800;font-size:14px}
.receipt-footer{font-size:9px;text-align:center;color:#888;margin-top:10px}
/* SEARCH */
.search-bar{background:var(--navy-light);border:1px solid var(--navy-border);border-radius:8px;padding:8px 13px;color:var(--white);font-family:'Vazirmatn',sans-serif;font-size:13px;direction:rtl;width:100%;max-width:260px}
.search-bar:focus{outline:none;border-color:var(--gold)}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-gap{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.text-gold{color:var(--gold)}.text-green{color:var(--green)}.text-red{color:var(--red)}.text-dim{color:var(--white-dim)}.text-sm{font-size:11px}.font-bold{font-weight:700}
/* SIDEBAR FOOTER */
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--navy-border)}
/* TOAST */
.toast{position:fixed;bottom:24px;left:24px;z-index:9999;background:var(--green);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);display:none}
.toast.show{display:block}
@media(max-width:768px){
  .sidebar{width:220px}
  .main{margin-right:0}
  .content{padding:14px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .topbar{padding:12px 14px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-page">
  <div class="login-card">
    <div class="login-icon">🏢</div>
    <div class="login-title">حیات‌زاده لمتد</div>
    <div class="login-sub">سیستم حسابداری سهامی</div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">نام کاربری</label>
      <input class="form-input" id="loginUser" placeholder="نام کاربری را بنویس" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">رمز عبور</label>
      <input class="form-input" type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div id="loginErr" style="color:var(--red);font-size:12px;text-align:center;margin-bottom:12px;display:none"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">🔐 ورود به سیستم</button>
  </div>
</div>
</div>

<!-- APP -->
<div id="appPage" style="display:none">
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title">🏢 حیات‌زاده لمتد</div>
      <div class="logo-sub">سیستم حسابداری سهامی</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">منوی اصلی</div>
      <button class="nav-item active" onclick="goPage('dashboard')" id="nav-dashboard">🏠 داشبورد</button>
      <button class="nav-item" onclick="goPage('shareholders')" id="nav-shareholders" data-admin>👥 سهم‌داران</button>
      <button class="nav-item" onclick="goPage('payments')" id="nav-payments" data-admin>💳 پرداخت‌ها</button>
      <button class="nav-item" onclick="goPage('investments')" id="nav-investments" data-admin>🏭 سرمایه‌گذاری</button>
      <button class="nav-item" onclick="goPage('returns')" id="nav-returns" data-admin>🔄 برگشت سرمایه</button>
      <button class="nav-item" onclick="goPage('profit')" id="nav-profit" data-admin>📈 تقسیم مفاد</button>
      <button class="nav-item" onclick="goPage('reports')" id="nav-reports">📊 گزارشات</button>
    </div>
    <div class="sidebar-footer">
      <div style="font-size:11px;color:var(--white-dim);margin-bottom:8px">
        <span id="userRoleBadge" class="badge badge-gold">مدیر</span>
        <span id="userNameSide" style="margin-right:8px"></span>
      </div>
      <button class="btn btn-danger btn-sm" style="width:100%;justify-content:center" onclick="doLogout()">🚪 خروج</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">🏠 داشبورد</div>
      <div class="topbar-user">
        <div class="user-dot"></div>
        <span id="userNameTop"></span>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>
</div>

<div class="toast" id="toast">✅ ذخیره شد!</div>

<script>
// ==================== DATA ====================
let DB = JSON.parse(localStorage.getItem('hz_db') || 'null') || {
  users: [
    {id:1, username:'admin', password:'admin123', role:'admin', name:'مدیر سیستم'},
    {id:2, username:'user', password:'user123', role:'user', name:'سهم‌دار'}
  ],
  shareholders: [
    {id:1, name:'احمد شاه محمدی', phone:'0700111222', shares:5, totalPaid:25000, status:'active', joinDate:'1402/01/15'},
    {id:2, name:'نجیب الله رحیمی', phone:'0701333444', shares:8, totalPaid:40000, status:'active', joinDate:'1402/02/10'},
    {id:3, name:'محمد اکرم حیات‌زاده', phone:'0702555666', shares:12, totalPaid:60000, status:'active', joinDate:'1402/01/01'},
    {id:4, name:'فریده نوری', phone:'0703777888', shares:3, totalPaid:15000, status:'active', joinDate:'1402/03/20'},
    {id:5, name:'عبدالرحمن ستانکزی', phone:'0704999000', shares:6, totalPaid:30000, status:'inactive', joinDate:'1402/02/05'},
  ],
  payments: [
    {id:1, shareholderId:1, amount:5000, date:'1402/04/01', type:'monthly', note:'پرداخت ماه چهارم'},
    {id:2, shareholderId:2, amount:8000, date:'1402/04/01', type:'monthly', note:'پرداخت ماه چهارم'},
    {id:3, shareholderId:3, amount:12000, date:'1402/04/01', type:'share_purchase', note:'خرید ۲ سهم اضافی'},
  ],
  investments: [
    {id:1, amount:80000, type:'PU خرید مواد خام', date:'1402/03/01', description:'خرید ۸ تن مواد خام PU از بازار کابل', status:'returned'},
    {id:2, amount:50000, type:'PU خرید مواد خام', date:'1402/04/10', description:'خرید ۵ تن مواد خام PU از بازار قندهار', status:'active'},
  ],
  returns: [
    {id:1, investmentId:1, totalReturn:96000, investmentAmount:80000, profit:16000, date:'1402/04/15', note:'فروش موفق - سود ۲۰٪'},
  ],
  distributions: [
    {id:1, returnId:1, totalProfit:16000, totalShares:34, profitPerShare:470.6, date:'1402/04/16'},
  ]
};

let currentUser = null;
let currentPage = 'dashboard';

function saveDB(){ localStorage.setItem('hz_db', JSON.stringify(DB)); }
function fmt(n){ return new Intl.NumberFormat('fa-AF').format(Math.round(n||0)); }
function genId(arr){ return arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1; }
function today(){
  const d=new Date();
  return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');
}
function showToast(msg='✅ ذخیره شد!'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ==================== AUTH ====================
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const user=DB.users.find(x=>x.username===u && x.password===p);
  const err=document.getElementById('loginErr');
  if(!user){ err.style.display='block'; err.textContent='نام کاربری یا رمز عبور اشتباه است'; return; }
  currentUser=user;
  err.style.display='none';
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appPage').style.display='block';
  document.getElementById('userNameTop').textContent=user.name;
  document.getElementById('userNameSide').textContent=user.name;
  document.getElementById('userRoleBadge').textContent=user.role==='admin'?'مدیر':'سهم‌دار';
  // نمایش منو بر اساس نقش
  document.querySelectorAll('[data-admin]').forEach(el=>{
    el.style.display=user.role==='admin'?'flex':'none';
  });
  goPage('dashboard');
}
function doLogout(){
  currentUser=null;
  document.getElementById('loginPage').style.display='block';
  document.getElementById('appPage').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

// ==================== NAVIGATION ====================
const pageTitles={dashboard:'🏠 داشبورد',shareholders:'👥 سهم‌داران',payments:'💳 پرداخت‌ها',investments:'🏭 سرمایه‌گذاری',returns:'🔄 برگشت سرمایه',profit:'📈 تقسیم مفاد',reports:'📊 گزارشات'};
function goPage(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl=document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');
  document.getElementById('pageTitle').textContent=pageTitles[page]||page;
  const c=document.getElementById('mainContent');
  if(page==='dashboard') c.innerHTML=renderDashboard();
  else if(page==='shareholders') c.innerHTML=renderShareholders();
  else if(page==='payments') c.innerHTML=renderPayments();
  else if(page==='investments') c.innerHTML=renderInvestments();
  else if(page==='returns') c.innerHTML=renderReturns();
  else if(page==='profit') c.innerHTML=renderProfit();
  else if(page==='reports') c.innerHTML=renderReports();
}

// ==================== DASHBOARD ====================
function renderDashboard(){
  const activeShares=DB.shareholders.filter(s=>s.status==='active').reduce((a,s)=>a+s.shares,0);
  const totalCapital=DB.shareholders.reduce((a,s)=>a+s.totalPaid,0);
  const totalProfit=DB.returns.reduce((a,r)=>a+r.profit,0);
  const totalInvested=DB.investments.reduce((a,i)=>a+i.amount,0);
  const active=DB.shareholders.filter(s=>s.status==='active').length;

  const chartData=DB.shareholders.filter(s=>s.status==='active').slice(0,6);
  const maxShares=Math.max(...chartData.map(s=>s.shares),1);
  const bars=chartData.map(s=>`
    <div class="bar-col">
      <div class="bar-fill" style="height:${(s.shares/maxShares)*100}%;background:var(--gold);opacity:.8"></div>
      <div class="bar-label">${s.name.split(' ')[0]}</div>
    </div>`).join('');

  const lastPayments=DB.payments.slice(-5).reverse().map(p=>{
    const sh=DB.shareholders.find(s=>s.id===p.shareholderId);
    return`<tr>
      <td class="font-bold">${sh?.name?.split(' ')[0]||'—'}</td>
      <td class="text-gold font-bold">${fmt(p.amount)}</td>
      <td><span class="badge ${p.type==='monthly'?'badge-blue':'badge-gold'}">${p.type==='monthly'?'ماهانه':'سهم'}</span></td>
    </tr>`;
  }).join('');

  return`
  <div class="stats-grid">
    <div class="stat-card blue"><div class="stat-label">👥 سهم‌داران فعال</div><div class="stat-value">${active}</div><div class="stat-sub">از ${DB.shareholders.length} نفر کل</div></div>
    <div class="stat-card gold"><div class="stat-label">📊 کل سهام</div><div class="stat-value">${fmt(activeShares)}</div><div class="stat-sub">واحد سهم</div></div>
    <div class="stat-card green"><div class="stat-label">💰 کل سرمایه</div><div class="stat-value">${fmt(totalCapital)}</div><div class="stat-sub">افغانی</div></div>
    <div class="stat-card green"><div class="stat-label">📈 کل مفاد</div><div class="stat-value">${fmt(totalProfit)}</div><div class="stat-sub">افغانی</div></div>
    <div class="stat-card gold"><div class="stat-label">🏭 سرمایه‌گذاری</div><div class="stat-value">${fmt(totalInvested)}</div><div class="stat-sub">${DB.investments.length} پروژه</div></div>
    <div class="stat-card blue"><div class="stat-label">🔄 برگشت سرمایه</div><div class="stat-value">${DB.returns.length}</div><div class="stat-sub">تراکنش</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card">
      <div class="card-title">📊 توزیع سهام</div>
      <div class="bar-chart">${bars}</div>
    </div>
    <div class="card">
      <div class="card-title">💹 آخرین پرداخت‌ها</div>
      <table><thead><tr><th>سهم‌دار</th><th>مبلغ</th><th>نوع</th></tr></thead>
      <tbody>${lastPayments||'<tr><td colspan="3" style="text-align:center;color:var(--white-dim)">هنوز پرداختی ثبت نشده</td></tr>'}</tbody></table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🏭 وضعیت سرمایه‌گذاری‌ها</div>
    <div class="table-wrap"><table>
      <thead><tr><th>توضیح</th><th>مبلغ</th><th>تاریخ</th><th>وضعیت</th></tr></thead>
      <tbody>${DB.investments.map(i=>`<tr>
        <td>${i.description}</td>
        <td class="text-gold font-bold">${fmt(i.amount)}</td>
        <td class="text-dim">${i.date}</td>
        <td><span class="badge ${i.status==='returned'?'badge-green':'badge-gold'}">${i.status==='returned'?'تکمیل':'در جریان'}</span></td>

      <span class="text-green font-bold" id="profitVal"></span>

function calcReturnProfit(){
  const invId=Number(document.getElementById('m-invId')?.value);
  const total=Number(document.getElementById('m-total')?.value);
  const inv=DB.investments.find(i=>i.id===invId);
  const prev=document.getElementById('profitPreview');
  if(inv&&total&&prev){
    const profit=total-inv.amount;
    prev.style.display='block';
    document.getElementById('profitVal').textContent=fmt(profit)+' افغانی';
  }
}

function saveReturn(){
  const invId=Number(document.getElementById('m-invId').value);
  const totalReturn=Number(document.getElementById('m-total').value);
  if(!invId||!totalReturn){ alert('سرمایه‌گذاری و مبلغ الزامی است!'); return; }
  const inv=DB.investments.find(i=>i.id===invId);
  const profit=totalReturn-inv.amount;
  DB.returns.push({id:genId(DB.returns),investmentId:invId,totalReturn,investmentAmount:inv.amount,profit,date:document.getElementById('m-date').value,note:document.getElementById('m-note').value});
  const idx=DB.investments.findIndex(i=>i.id===invId);
  if(idx>=0) DB.investments[idx].status='returned';
  saveDB(); closeModal(); showToast(); goPage('returns');
}

      <div style="text-align:center;padding:10px 18px;background:var(--navy-light);border-radius:8px">
        <div class="text-dim text-sm">مفاد هر سهم</div>
        <div class="text-green font-bold" style="font-size:17px">× سهام شخص</div>
      </div>
      <div style="display:flex;align-items:center;font-size:20px">→</div>
      <div style="text-align:center;padding:10px 18px;background:var(--navy-light);border-radius:8px">
        <div class="text-dim text-sm">مفاد شخص</div>
        <div class="text-gold font-bold" style="font-size:17px">✅ نهایی</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📊 سوابق تقسیم مفاد</div>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>مفاد کل</th><th>کل سهام</th><th>مفاد هر سهم</th><th>تاریخ</th><th>جزئیات</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--white-dim)">هنوز تقسیمی انجام نشده</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

function showDistribute(){
  const activeShares=DB.shareholders.filter(s=>s.status==='active').reduce((a,s)=>a+s.shares,0);
  const options=DB.returns.map(r=>`<option value="${r.id}">مفاد ${fmt(r.profit)} افغانی (${r.date})</option>`).join('');
  showModal('تقسیم مفاد جدید',`
    <div class="form-grid">
      <div class="form-group"><label class="form-label">برگشت سرمایه *</label>
        <select class="form-select" id="m-retId" onchange="calcDistPreview()"><option value="">انتخاب کنید...</option>${options}</select></div>
      <div class="form-group"><label class="form-label">تاریخ تقسیم</label><input class="form-input" id="m-date" value="${today()}"/></div>
    </div>
    <div id="distPreview" style="margin-top:12px;padding:12px;background:rgba(82,199,133,.1);border:1px solid rgba(82,199,133,.3);border-radius:8px;display:none">
      <div class="text-dim text-sm">مفاد هر سهم:</div>
      <div class="text-green font-bold" style="font-size:20px" id="perShareVal"></div>
      <div class="text-dim text-sm" style="margin-top:4px">کل سهام فعال: ${fmt(activeShares)}</div>
    </div>`,'saveDistribution()');
}

function calcDistPreview(){
  const retId=Number(document.getElementById('m-retId')?.value);
  const ret=DB.returns.find(r=>r.id===retId);
  const activeShares=DB.shareholders.filter(s=>s.status==='active').reduce((a,s)=>a+s.shares,0);
  const prev=document.getElementById('distPreview');
  if(ret&&prev){
    prev.style.display='block';
    document.getElementById('perShareVal').textContent=fmt(ret.profit/activeShares)+' افغانی';
  }
}

function saveDistribution(){
  const retId=Number(document.getElementById('m-retId').value);
  const ret=DB.returns.find(r=>r.id===retId);
  if(!retId||!ret){ alert('برگشت سرمایه را انتخاب کنید!'); return; }
  const activeShares=DB.shareholders.filter(s=>s.status==='active').reduce((a,s)=>a+s.shares,0);
  const profitPerShare=ret.profit/activeShares;
  DB.distributions.push({id:genId(DB.distributions),returnId:retId,totalProfit:ret.profit,totalShares:activeShares,profitPerShare,date:document.getElementById('m-date').value});
  saveDB(); closeModal(); showToast('⚡ مفاد تقسیم شد!'); goPage('profit');
}

function showDistDetail(id){
  const d=DB.distributions.find(x=>x.id===id);
  if(!d) return;
  const rows=DB.shareholders.filter(s=>s.status==='active').map(s=>`<tr>
    <td class="font-bold">${s.name}</td>
    <td>${s.shares}</td>
    <td class="text-green font-bold">${fmt(s.shares*d.profitPerShare)} افغانی</td>
  </tr>`).join('');
  showModal(`جزئیات تقسیم — ${d.date}`,`
    <div style="margin-bottom:12px;padding:12px;background:var(--navy-light);border-radius:8px;font-size:13px">
      <div class="flex-between"><span class="text-dim">مفاد کل:</span><span class="text-green font-bold">${fmt(d.totalProfit)}</span></div>
      <div class="flex-between" style="margin-top:6px"><span class="text-dim">مفاد هر سهم:</span><span class="text-gold font-bold">${fmt(d.profitPerShare)}</span></div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>سهم‌دار</th><th>سهام</th><th>سود دریافتی</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`,null);
}

// ==================== REPORTS ====================
function renderReports(){
  const totalShares=DB.shareholders.filter(s=>s.status==='active').reduce((a,s)=>a+s.shares,0);
  const totalProfit=DB.returns.reduce((a,r)=>a+r.profit,0);
  const shRows=DB.shareholders.map(s=>{
    const pct=totalShares?((s.shares/totalShares)*100).toFixed(1):0;
    const myProfit=DB.distributions.reduce((a,d)=>a+s.shares*d.profitPerShare,0);
    return`<tr>
      <td class="font-bold">${s.name}</td>
      <td class="text-gold font-bold">${s.shares}</td>
      <td><span class="badge badge-blue">${pct}٪</span></td>
      <td>${fmt(s.totalPaid)}</td>
      <td class="text-green font-bold">${fmt(myProfit)}</td>
      <td><span class="badge ${s.status==='active'?'badge-green':'badge-red'}">${s.status==='active'?'فعال':'غیرفعال'}</span></td>
    </tr>`;
  }).join('');

  const invRows=DB.investments.map(inv=>{
    const ret=DB.returns.find(r=>r.investmentId===inv.id);
    return`<tr>
      <td>${inv.description}</td>
      <td class="text-gold">${fmt(inv.amount)}</td>
      <td>${ret?fmt(ret.totalReturn):'—'}</td>
      <td class="${ret?'text-green font-bold':'text-dim'}">${ret?fmt(ret.profit):'—'}</td>
      <td>${ret?`<span class="badge badge-green">${((ret.profit/ret.investmentAmount)*100).toFixed(1)}٪</span>`:'—'}</td>
      <td><span class="badge ${inv.status==='returned'?'badge-green':'badge-gold'}">${inv.status==='returned'?'تکمیل':'در جریان'}</span></td>
    </tr>`;
  }).join('');

  return`
  <div style="font-size:20px;font-weight:800;margin-bottom:20px">گزارشات</div>
  <div class="stats-grid">
    <div class="stat-card blue"><div class="stat-label">👥 کل سهم‌داران</div><div class="stat-value">${DB.shareholders.length}</div><div class="stat-sub">${DB.shareholders.filter(s=>s.status==='active').length} فعال</div></div>
    <div class="stat-card gold"><div class="stat-label">📊 کل سهام</div><div class="stat-value">${fmt(totalShares)}</div></div>
    <div class="stat-card green"><div class="stat-label">💰 کل سرمایه</div><div class="stat-value">${fmt(DB.shareholders.reduce((a,s)=>a+s.totalPaid,0))}</div><div class="stat-sub">افغانی</div></div>
    <div class="stat-card green"><div class="stat-label">📈 کل مفاد</div><div class="stat-value">${fmt(totalProfit)}</div><div class="stat-sub">افغانی</div></div>
  </div>
  <div class="card mb-20">
    <div class="card-title">👥 گزارش کامل سهم‌داران</div>
    <div class="table-wrap"><table>
      <thead><tr><th>نام</th><th>سهام</th><th>٪ سهم</th><th>پرداخت کل</th><th>سود دریافتی</th><th>وضعیت</th></tr></thead>
      <tbody>${shRows}</tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="card-title">🏭 گزارش سرمایه‌گذاری‌ها</div>
    <div class="table-wrap"><table>
      <thead><tr><th>توضیح</th><th>سرمایه</th><th>برگشت</th><th>مفاد</th><th>درصد</th><th>وضعیت</th></tr></thead>
      <tbody>${invRows}</tbody>
    </table></div>
  </div>`;
}

// ==================== MODAL ====================
function showModal(title, body, saveAction, saveLabel='💾 ذخیره', saveCallback=null){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='modalOverlay';
  overlay.onclick=e=>{ if(e.target===overlay) closeModal(); };
  overlay.innerHTML=`
    <div class="modal">
      <div class="modal-title">${title}</div>
      ${body}
      <div class="modal-actions">
        ${saveAction?`<button class="btn btn-primary" onclick="${saveAction}">${saveLabel}</button>`:''}
        ${saveCallback?`<button class="btn btn-primary" onclick="window._modalCb()">${saveLabel}</button>`:''}
        <button class="btn btn-outline" onclick="closeModal()">انصراف</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  if(saveCallback) window._modalCb=saveCallback;
}
function closeModal(){
  const m=document.getElementById('modalOverlay');
  if(m) m.remove();
}

// ==================== SETTINGS ====================
// تغییر رمز عبور — از طریق داشبورد
function changePassword(userId, newPass){
  const idx=DB.users.findIndex(u=>u.id===userId);
  if(idx>=0){ DB.users[idx].password=newPass; saveDB(); showToast('🔐 رمز عبور تغییر کرد!'); }
}

document.getElementById('loginUser').focus();
